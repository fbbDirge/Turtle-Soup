<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f4ea" />
    <title>011208 游戏合集</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f4ea;
        --panel: #fffdf6;
        --ink: #20231f;
        --muted: #6b7068;
        --line: #d8d2c1;
        --green: #1f7a5c;
        --blue: #2d6f9f;
        --coral: #bd4d3a;
        --gold: #b78224;
        --shadow: 0 18px 50px rgba(32, 35, 31, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(32, 35, 31, 0.05) 1px, transparent 1px) 0 0 / 32px 32px,
          linear-gradient(0deg, rgba(32, 35, 31, 0.04) 1px, transparent 1px) 0 0 / 32px 32px,
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(1120px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 28px 0 36px;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding-bottom: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .mark {
        width: 42px;
        height: 42px;
        border: 2px solid var(--ink);
        background: var(--panel);
        display: grid;
        place-items: center;
        box-shadow: 4px 4px 0 var(--ink);
        flex: 0 0 auto;
      }

      .brand strong {
        display: block;
        font-size: 16px;
        line-height: 1.1;
      }

      .brand span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .status {
        border: 1px solid var(--line);
        background: rgba(255, 253, 246, 0.7);
        padding: 9px 12px;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }

      .status::before {
        content: "";
        width: 8px;
        height: 8px;
        background: #2fa66a;
        border-radius: 50%;
        box-shadow: 0 0 0 4px rgba(47, 166, 106, 0.14);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
        gap: 26px;
        align-items: end;
        margin: auto 0;
      }

      .intro {
        padding: 22px 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(40px, 8vw, 92px);
        line-height: 0.92;
        font-weight: 900;
      }

      .intro p {
        max-width: 440px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.8;
      }

      .quick-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 30px;
      }

      .quick-links a {
        height: 42px;
        border: 1px solid var(--ink);
        background: var(--panel);
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 800;
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      .quick-links a:hover {
        transform: translate(-2px, -2px);
        box-shadow: 4px 4px 0 var(--ink);
      }

      .games {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .game-card {
        min-height: 520px;
        border: 2px solid var(--ink);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .game-card:hover {
        transform: translateY(-5px);
        box-shadow: 8px 12px 0 rgba(32, 35, 31, 0.95);
      }

      .visual {
        min-height: 260px;
        border-bottom: 2px solid var(--ink);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .visual svg {
        width: 100%;
        max-width: 340px;
        height: auto;
        display: block;
      }

      .soup {
        background: #eaf4ef;
      }

      .draw {
        background: #eef3fb;
      }

      .content {
        padding: 20px;
        display: flex;
        flex: 1;
        flex-direction: column;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .content h2 {
        margin: 9px 0 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .content p {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 18px 0 22px;
      }

      .meta span {
        border: 1px solid var(--line);
        background: #faf7ed;
        padding: 6px 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .play {
        margin-top: auto;
        height: 48px;
        border: 0;
        color: #fff;
        font-size: 15px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .play.soup-btn {
        background: var(--green);
      }

      .play.draw-btn {
        background: var(--blue);
      }

      .footer {
        margin-top: 28px;
        color: var(--muted);
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .intro {
          padding: 8px 0 0;
        }

        .games {
          grid-template-columns: 1fr;
        }

        .game-card {
          min-height: auto;
        }
      }

      @media (max-width: 560px) {
        .page {
          width: min(100% - 20px, 1120px);
          padding-top: 16px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
          padding-bottom: 18px;
        }

        .status {
          width: 100%;
          justify-content: center;
        }

        h1 {
          font-size: 44px;
        }

        .intro p {
          font-size: 14px;
        }

        .quick-links {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .quick-links a {
          justify-content: center;
        }

        .visual {
          min-height: 210px;
        }

        .content h2 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">

              <div class="meta">

              <span class="play soup-btn">

              <div class="meta">
                <span>实时绘画</span>

              </div>
              <span class="play draw-btn">
                进入游戏
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">

        </section>
      </main>

      <footer class="footer">
        <span>011208.shop</span>
        <span>Game hub online</span>
      </footer>
    </div>
  </body>
</html>
